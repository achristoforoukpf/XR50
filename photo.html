<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KPF Edge AR — Photo Pin Prototype</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-user-select:none; user-select:none; -webkit-tap-highlight-color:transparent; }
  html,body { width:100%; background:#0b1f3a; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; color:#fff; }
  #stage { position:relative; width:100%; max-width:1200px; margin:0 auto; }
  #stage img { width:100%; display:block; }
  .pin { position:absolute; transform:translate(-50%,-100%); touch-action:none; }
  .pin .label { background:rgba(0,0,0,0.88); border:1px solid rgba(255,255,255,0.5); padding:6px 10px; border-radius:14px; font-size:13px; font-weight:700; white-space:nowrap; box-shadow:0 2px 8px rgba(0,0,0,.4); text-align:center; line-height:1.35; }
  .pin .label small { display:block; font-weight:500; opacity:.85; font-size:11px; }
  .pin .stem { width:2px; height:14px; background:rgba(255,255,255,0.85); margin:0 auto; }
  .pin .dot { width:14px; height:14px; border-radius:50%; background:#fff; border:3px solid rgba(0,0,0,1); margin:0 auto; box-shadow:0 0 6px rgba(0,0,0,.5); }
  .pin.dragging .label { background:rgba(230,150,20,0.95); }
  .pin .dot::after { content:"i"; display:block; text-align:center; font-size:11px; font-weight:800; line-height:14px; color:#000; font-style:italic; }

  #bar { max-width:1200px; margin:0 auto; padding:14px 16px calc(14px + env(safe-area-inset-bottom)); display:flex; flex-wrap:wrap; gap:10px; align-items:center; justify-content:space-between; }
  #bar h1 { font-size:15px; font-weight:800; }
  #bar p { font-size:12px; opacity:.75; }
  .toggle { pointer-events:auto; background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.35); color:#fff; font-size:13px; font-weight:600; padding:9px 14px; border-radius:10px; }
  .toggle:active { background:rgba(255,255,255,0.3); }

  /* Info card */
  #infoBackdrop { position:fixed; inset:0; z-index:8; background:rgba(0,0,0,0.45); display:none; }
  #infoCard { position:fixed; left:0; right:0; bottom:0; z-index:9; background:#12233f; border-top:1px solid rgba(255,255,255,0.25); border-radius:18px 18px 0 0; padding:18px 18px calc(18px + env(safe-area-inset-bottom)); transform:translateY(105%); transition:transform .25s ease; box-shadow:0 -6px 24px rgba(0,0,0,.5); max-height:60vh; overflow-y:auto; max-width:1200px; margin:0 auto; }
  #infoCard.open { transform:translateY(0); }
  #infoCard .close { position:absolute; top:10px; right:14px; background:none; border:none; color:#fff; font-size:22px; opacity:.7; }
  #infoCard h2 { font-size:19px; font-weight:800; margin-bottom:2px; padding-right:30px; }
  #infoCard .sub { font-size:12px; opacity:.65; margin-bottom:14px; }
  #infoCard .fields { display:grid; grid-template-columns:auto 1fr; gap:6px 14px; font-size:13px; margin-bottom:12px; }
  #infoCard .fields dt { opacity:.6; font-weight:600; }
  #infoCard .fields dd { font-weight:600; }
  #infoCard .desc { font-size:13px; line-height:1.5; opacity:.85; border-top:1px solid rgba(255,255,255,0.15); padding-top:12px; }
  #infoCard .placeholder-tag { display:inline-block; margin-top:10px; font-size:11px; padding:3px 8px; border-radius:8px; background:rgba(230,150,20,0.25); color:#ffcf8a; font-weight:700; }
</style>
</head>
<body>

<div id="bar">
  <div>
    <h1>KPF Edge AR — Static Photo Prototype</h1>
    <p>Drag pins to align them exactly, then tap "Log positions" to read out the tuned %.</p>
  </div>
  <button class="toggle" id="logBtn">Log positions</button>
</div>

<div id="stage">
  <img src="office-view.png" alt="View south from KPF HQ, 11 West 42nd Street">
</div>

<div id="infoBackdrop"></div>
<div id="infoCard">
  <button class="close" id="infoClose">&times;</button>
  <h2 id="infoName">—</h2>
  <div class="sub" id="infoSub">—</div>
  <dl class="fields" id="infoFields"></dl>
  <div class="desc" id="infoDesc"></div>
  <div class="placeholder-tag">PLACEHOLDER DATA — demo only</div>
</div>

<script>
  // Camera: 11 West 42nd St window (exact pin drop, 6th floor).
  // Bearings/distances below are computed live from lat/lng via the haversine bearing formula —
  // this is the same engine that will drive live pin placement at The Edge.
  const OFFICE = { lat: 40.754157, lon: -73.981942 };

  const BUILDINGS = [
    { id: 1, name: "Building 1", lat: 40.752282, lon: -73.982214, xPct: 11.5, yPct: 19 },
    { id: 2, name: "Building 2", lat: 40.753454, lon: -73.985334, xPct: 64.5, yPct: 40 },
    { id: 3, name: "Building 3", lat: 40.754673, lon: -73.984757, xPct: 90.0, yPct: 24 },
  ];

  function bearingDistance(lat1, lon1, lat2, lon2) {
    const rad = d => d * Math.PI / 180;
    const phi1 = rad(lat1), phi2 = rad(lat2), dLambda = rad(lon2 - lon1);
    const y = Math.sin(dLambda) * Math.cos(phi2);
    const x = Math.cos(phi1) * Math.sin(phi2) - Math.sin(phi1) * Math.cos(phi2) * Math.cos(dLambda);
    const bearing = (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
    const R = 6371000;
    const dPhi = phi2 - phi1;
    const a = Math.sin(dPhi/2)**2 + Math.cos(phi1)*Math.cos(phi2)*Math.sin(dLambda/2)**2;
    const dist = 2 * R * Math.asin(Math.sqrt(a));
    return { bearing, dist };
  }

  const stage = document.getElementById('stage');

  // ---- Placeholder info-card content ----
  const PLACEHOLDER_BLURBS = [
    "Placeholder project description — swap in the real write-up, project photography, and credits here once wired to KPF's project database.",
    "This is demo copy only. In production this card would pull live from the project record: scope, completion date, awards, and design narrative.",
    "Sample text for prototyping the info-card layout. Real content (renderings, stats, press) would load here per building.",
  ];
  function placeholderInfo(name, dist) {
    return {
      architect: "Kohn Pedersen Fox (placeholder)",
      year: [2011, 2016, 2019][Math.floor(Math.random() * 3)] + " (placeholder)",
      height: Math.round(400 + Math.random() * 500) + " ft (placeholder)",
      stories: Math.round(30 + Math.random() * 50) + " (placeholder)",
      distance: `${Math.round(dist)} m / ${Math.round(dist*3.281)} ft`,
      desc: PLACEHOLDER_BLURBS[Math.floor(Math.random() * PLACEHOLDER_BLURBS.length)],
    };
  }
  function showInfo(b) {
    const info = b.info;
    document.getElementById('infoName').textContent = b.name;
    document.getElementById('infoSub').textContent = `${info.distance} away · bearing ${b.bearing.toFixed(0)}°`;
    document.getElementById('infoFields').innerHTML = `
      <dt>Architect</dt><dd>${info.architect}</dd>
      <dt>Completed</dt><dd>${info.year}</dd>
      <dt>Height</dt><dd>${info.height}</dd>
      <dt>Stories</dt><dd>${info.stories}</dd>`;
    document.getElementById('infoDesc').textContent = info.desc;
    document.getElementById('infoCard').classList.add('open');
    document.getElementById('infoBackdrop').style.display = 'block';
  }
  function hideInfo() {
    document.getElementById('infoCard').classList.remove('open');
    document.getElementById('infoBackdrop').style.display = 'none';
  }
  document.getElementById('infoClose').addEventListener('click', hideInfo);
  document.getElementById('infoBackdrop').addEventListener('click', hideInfo);

  BUILDINGS.forEach(b => {
    const { bearing, dist } = bearingDistance(OFFICE.lat, OFFICE.lon, b.lat, b.lon);
    b.bearing = bearing; b.dist = dist;
    b.info = placeholderInfo(b.name, dist);

    const el = document.createElement('div');
    el.className = 'pin';
    el.style.left = b.xPct + '%';
    el.style.top = b.yPct + '%';
    el.innerHTML = `
      <div class="label">${b.name}<small>${bearing.toFixed(0)}° · ${Math.round(dist)}m / ${Math.round(dist*3.281)}ft</small></div>
      <div class="stem"></div>
      <div class="dot"></div>`;
    stage.appendChild(el);
    b.el = el;

    // Drag to fine-tune (pointer events cover mouse + touch); a short tap with
    // negligible movement opens the info card instead of starting a drag.
    let dragging = false, moved = false, startX = 0, startY = 0;
    el.addEventListener('pointerdown', e => {
      dragging = true; moved = false; startX = e.clientX; startY = e.clientY;
      el.classList.add('dragging'); el.setPointerCapture(e.pointerId);
    });
    el.addEventListener('pointerup', () => {
      dragging = false; el.classList.remove('dragging');
      if (!moved) showInfo(b);
    });
    el.addEventListener('pointermove', e => {
      if (!dragging) return;
      if (Math.hypot(e.clientX - startX, e.clientY - startY) > 6) moved = true;
      const rect = stage.getBoundingClientRect();
      b.xPct = Math.min(100, Math.max(0, (e.clientX - rect.left) / rect.width * 100));
      b.yPct = Math.min(100, Math.max(0, (e.clientY - rect.top) / rect.height * 100));
      el.style.left = b.xPct + '%';
      el.style.top = b.yPct + '%';
    });
  });

  document.getElementById('logBtn').addEventListener('click', () => {
    const lines = BUILDINGS.map(b => `${b.name}: xPct=${b.xPct.toFixed(1)}, yPct=${b.yPct.toFixed(1)}  (bearing ${b.bearing.toFixed(1)}°, ${Math.round(b.dist)}m)`);
    alert(lines.join('\n'));
  });
</script>
</body>
</html>
